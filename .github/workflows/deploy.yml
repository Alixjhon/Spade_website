name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frontend deployment
        env:
          HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "FRONTEND_DEPLOY_HOOK_URL is not set. Skipping frontend deployment."
            exit 0
          fi

          curl --fail --silent --show-error -X POST "$HOOK_URL"

  deploy-backend:
    name: Deploy Backend
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deployment
        env:
          HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "BACKEND_DEPLOY_HOOK_URL is not set. Skipping backend deployment."
            exit 0
          fi

          curl --fail --silent --show-error -X POST "$HOOK_URL"
